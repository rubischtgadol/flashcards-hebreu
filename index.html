<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Hébreu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700&family=Assistant:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playpen+Sans+Hebrew:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1620; --bg2:#151f2b; --card:#1c2733; --card-edge:#26333f;
    --ink:#ece3d2; --ink-dim:#8b96a3; --gold:#d9a441; --gold-soft:#e8c583;
    --green:#5bbd7a; --red:#d96a5b; --line:#28333f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:radial-gradient(120% 80% at 50% 0%, var(--bg2), var(--bg) 70%);
    color:var(--ink);
    font-family:'Assistant','Arial Hebrew','Helvetica Neue',Arial,sans-serif;
    font-size:18px;
    min-height:100dvh;
    display:flex; flex-direction:column;
    padding:16px 14px 26px;
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }

  /* ---------- Header ---------- */
  header{ text-align:center; margin-bottom:10px; }
  .brand{
    font-family:'Frank Ruhl Libre','David Libre','Times New Roman',serif; font-weight:700;
    font-size:1.5rem; letter-spacing:.01em;
  }
  .brand .he{ color:var(--gold); }
  .tagline{ color:var(--ink-dim); font-size:.82rem; margin-top:1px; }

  /* ---------- Setup panel ---------- */
  .panel{
    background:linear-gradient(180deg, var(--card), var(--bg2));
    border:1px solid var(--card-edge); border-radius:16px;
    padding:16px 15px; max-width:520px; width:100%; margin:8px auto 0;
  }
  .panel h2{
    font-family:'Assistant','Arial Hebrew','Helvetica Neue',Arial,sans-serif; font-size:.72rem; font-weight:700;
    text-transform:uppercase; letter-spacing:.12em; color:var(--gold);
    margin:0 0 9px;
  }
  .panel h2:not(:first-of-type){ margin-top:18px; }

  /* ---------- Search ---------- */
  .search-wrap{ position:relative; margin-bottom:4px; }
  .search-ico{ position:absolute; left:13px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:var(--ink-dim); pointer-events:none; }
  #search-input{
    width:100%; border-radius:12px; border:1px solid var(--line);
    background:var(--bg2); color:var(--ink); font-family:inherit; font-size:1rem;
    padding:12px 38px 12px 40px; outline:none; transition:border-color .15s ease;
  }
  #search-input:focus{ border-color:var(--gold); }
  .search-clear{
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    width:28px; height:28px; border-radius:50%; border:none; background:transparent;
    color:var(--ink-dim); font-size:1.3rem; line-height:1; cursor:pointer;
  }
  .search-results{ margin:10px 0 4px; display:flex; flex-direction:column; gap:6px; max-height:340px; overflow-y:auto; }
  .sr-count{ font-size:.72rem; color:var(--ink-dim); padding:2px 2px 4px; }
  .sr-row{
    display:flex; align-items:center; gap:11px; padding:9px 11px;
    border:1px solid var(--line); border-radius:11px; background:var(--bg2); cursor:pointer;
    transition:border-color .12s ease;
  }
  .sr-row:hover{ border-color:var(--gold); }
  .sr-speak{
    flex:none; width:34px; height:34px; border-radius:50%;
    border:1px solid var(--line); background:transparent; color:var(--gold);
    display:flex; align-items:center; justify-content:center; padding:0;
  }
  .sr-speak svg{ width:17px; height:17px; }
  .sr-body{ flex:1; min-width:0; }
  .sr-he{ font-family:'Frank Ruhl Libre','David Libre','Times New Roman',serif; font-size:1.3rem; direction:rtl; }
  .sr-tr{ font-family:'JetBrains Mono',monospace; font-size:.72rem; color:var(--ink-dim); margin-inline-start:8px; }
  .sr-fr{ color:var(--ink); font-size:.9rem; margin-top:1px; }
  .sr-cat{ flex:none; font-size:.6rem; text-transform:uppercase; letter-spacing:.08em; color:var(--gold); border:1px solid var(--line); border-radius:999px; padding:3px 9px; white-space:nowrap; }
  .search-empty{ color:var(--ink-dim); font-size:.85rem; padding:10px 2px; }
  .sr-item{ border:1px solid var(--line); border-radius:11px; background:var(--bg2); overflow:hidden; }
  .sr-item .sr-row{ border:none; border-radius:0; background:transparent; }
  .sr-item.open{ border-color:var(--gold); }
  .sr-chev{ flex:none; color:var(--ink-dim); font-size:1.3rem; line-height:1; transition:transform .18s ease; }
  .sr-item.open .sr-chev{ transform:rotate(90deg); color:var(--gold); }
  .sr-detail{ padding:2px 12px 12px 12px; border-top:1px dashed var(--line); margin:0 0 2px; }
  .srd-title{ font-size:.64rem; text-transform:uppercase; letter-spacing:.1em; color:var(--gold); margin:10px 0 7px; }
  .srd-forms{ display:grid; grid-template-columns:1fr 1fr; gap:6px 16px; direction:rtl; }
  .srd-f{ display:flex; align-items:baseline; gap:7px; }
  .srd-he{ font-family:'Frank Ruhl Libre','David Libre','Times New Roman',serif; font-size:1.15rem; direction:rtl; }
  .srd-lbl{ font-family:'JetBrains Mono',monospace; font-size:.66rem; color:var(--ink-dim); direction:ltr; }
  .srd-note{ font-size:.8rem; color:var(--ink-dim); font-style:italic; margin-top:10px; direction:ltr; }
  .chips{ display:flex; flex-wrap:wrap; gap:7px; }
  .chip{
    border:1px solid var(--line); background:transparent; color:var(--ink);
    font-family:inherit; font-size:.86rem; padding:7px 13px; border-radius:999px;
    cursor:pointer; transition:all .15s ease; user-select:none;
  }
  .chip:hover{ border-color:var(--gold); }
  .chip[aria-pressed="true"]{
    background:var(--gold); color:#1a1206; border-color:var(--gold); font-weight:600;
  }
  .chip .n{ opacity:.6; font-size:.76em; margin-inline-start:5px; }
  .chip[aria-pressed="true"] .n{ opacity:.7; }
  .seg{ display:flex; gap:7px; flex-wrap:wrap; }
  .cat-row{ display:flex; align-items:center; gap:8px; margin-bottom:9px; }
  .cat-row .chip{ font-size:.78rem; padding:5px 11px; }
  .selall{
    background:none; border:none; color:var(--gold); font-family:inherit;
    font-size:.78rem; cursor:pointer; text-decoration:underline; padding:0;
  }
  .start{
    margin-top:20px; width:100%; border:none; border-radius:12px;
    background:linear-gradient(180deg, var(--gold-soft), var(--gold));
    color:#1a1206; font-family:inherit; font-weight:700; font-size:1.02rem;
    padding:14px; cursor:pointer; letter-spacing:.01em;
    box-shadow:0 6px 18px -8px var(--gold);
  }
  .start:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; }

  /* ---------- Study screen ---------- */
  .study{ display:none; flex-direction:column; flex:1; max-width:520px; width:100%; margin:0 auto; }
  .study.active{ display:flex; }
  .setup.hidden{ display:none; }

  .progress-wrap{ display:flex; align-items:center; gap:12px; margin:6px 2px 16px; }
  .bar{ flex:1; height:5px; background:var(--line); border-radius:999px; overflow:hidden; }
  .bar > span{ display:block; height:100%; width:0; background:var(--gold); border-radius:999px; transition:width .35s ease; }
  .counter{ font-family:'JetBrains Mono',monospace; font-size:.76rem; color:var(--ink-dim); white-space:nowrap; }
  .exit{ background:none; border:none; color:var(--ink-dim); font-size:1.3rem; line-height:1; cursor:pointer; padding:0 2px; }

  /* ---------- The card ---------- */
  .stage{ flex:1; display:flex; align-items:center; justify-content:center; margin-bottom:4px; }
  .flip{
    position:relative; width:100%; max-width:420px;
    display:flex; flex-direction:column;
    border-radius:20px; border:1px solid var(--card-edge);
    background:linear-gradient(160deg, var(--card), var(--bg2));
    box-shadow:0 20px 50px -22px #000, inset 0 1px 0 rgba(255,255,255,.03);
    cursor:pointer; overflow:hidden;
    min-height:340px; max-height:520px; height:min(60vh,520px);
    transition:transform .12s ease;
  }
  .flip:active{ transform:scale(.994); }
  .face{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:44px 22px 40px; text-align:center; overflow-y:auto;
  }
  .face .eyebrow{
    position:absolute; top:16px; left:0; right:0;
    font-size:.68rem; letter-spacing:.14em; text-transform:uppercase;
    color:var(--gold); font-weight:600;
  }
  .face .hint{
    position:absolute; bottom:14px; left:0; right:0;
    font-size:.72rem; color:var(--ink-dim);
  }
  .speak-btn{
    position:absolute; top:12px; right:12px;
    width:38px; height:38px; border-radius:50%;
    border:1px solid var(--card-edge); background:var(--bg2); color:var(--gold);
    display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; z-index:3;
  }
  .speak-btn:active{ transform:scale(.92); }
  .speak-btn svg{ width:19px; height:19px; }
  .speak-btn.speaking{ animation:pulse 1s ease infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(217,164,65,.4);} 50%{ box-shadow:0 0 0 7px rgba(217,164,65,0);} }
  .he-big{
    font-family:'Frank Ruhl Libre','David Libre','Times New Roman',serif;
    font-size:3.1rem; line-height:1.25; direction:rtl; color:var(--ink);
  }
  .he-cursive{ font-family:'Playpen Sans Hebrew','Frank Ruhl Libre',cursive; font-weight:400; }
  .tr-big{ font-family:'JetBrains Mono',monospace; color:var(--gold-soft); font-size:1.05rem; margin-top:16px; }
  .fr-big{ font-size:1.5rem; color:var(--ink); }
  .sub{ color:var(--ink-dim); font-size:.95rem; margin-top:14px; }
  .divider{ width:38px; height:2px; background:var(--card-edge); border-radius:2px; margin:20px auto 0; }
  .forms{ margin-top:18px; display:grid; grid-template-columns:1fr 1fr; gap:9px 18px; direction:rtl; width:100%; max-width:340px; }
  .form-cell{ display:flex; flex-direction:column; align-items:center; gap:1px; }
  .form-cell .fhe{ font-family:'Frank Ruhl Libre','David Libre',serif; font-size:1.4rem; direction:rtl; }
  .form-cell .flbl{ font-family:'JetBrains Mono',monospace; font-size:.6rem; color:var(--ink-dim); direction:ltr; }
  .note-line{ margin-top:16px; font-size:.82rem; color:var(--ink-dim); font-style:italic; max-width:300px; }

  /* ---------- Answer buttons ---------- */
  .actions{ display:flex; gap:10px; margin-top:10px; }
  .btn{
    flex:1; border:none; border-radius:13px; padding:15px 10px;
    font-family:inherit; font-size:.95rem; font-weight:600; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:7px; transition:transform .1s ease;
  }
  .btn:active{ transform:scale(.96); }
  .btn-good{ background:rgba(91,189,122,.14); color:var(--green); border:1px solid rgba(91,189,122,.3); }
  .btn-bad{ background:rgba(217,106,91,.14); color:var(--red); border:1px solid rgba(217,106,91,.3); }
  .btn-flip{
    width:100%; background:linear-gradient(180deg,var(--gold-soft),var(--gold)); color:#1a1206;
    border:none; border-radius:13px; padding:15px; font-family:inherit; font-weight:700; font-size:1rem;
    cursor:pointer; margin-top:10px;
  }
  .hidden-btns{ display:none; }

  /* ---------- Input mode ---------- */
  .input-wrap{ margin-top:14px; }
  #answer-input{
    width:100%; border-radius:13px; border:1px solid var(--line);
    background:var(--bg2); color:var(--ink); font-family:inherit; font-size:1.15rem;
    text-align:center; padding:15px; outline:none; direction:auto;
  }
  #answer-input:focus{ border-color:var(--gold); }
  #answer-input.ok{ border-color:var(--green); }
  #answer-input.no{ border-color:var(--red); }
  .input-row{ margin-top:10px; }
  .input-row.hide{ display:none; }
  .feedback{ margin-top:14px; min-height:24px; }
  .verdict{ font-weight:700; font-size:1.05rem; }
  .verdict.ok{ color:var(--green); }
  .verdict.no{ color:var(--red); }
  .correct-answer{ margin-top:8px; }
  .correct-answer .he{ font-family:'Frank Ruhl Libre',serif; font-size:1.6rem; direction:rtl; }
  .correct-answer .tr{ font-family:'JetBrains Mono',monospace; color:var(--gold-soft); font-size:.9rem; margin-top:4px; }

  /* ---------- Done screen ---------- */
  .done{ display:none; flex-direction:column; align-items:center; justify-content:center; flex:1; text-align:center; max-width:420px; margin:0 auto; }
  .done.active{ display:flex; }
  .score-ring{
    width:150px; height:150px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    border:3px solid var(--gold); margin-bottom:22px;
  }
  .score-ring .score{ font-size:2.6rem; font-weight:700; color:var(--gold); font-family:'Frank Ruhl Libre',serif; }
  .score-ring .score small{ font-size:1.1rem; color:var(--ink-dim); }
  .done h2{ font-size:1.4rem; margin:0 0 8px; }
  .done p{ color:var(--ink-dim); margin:0 0 26px; }
  .done-btns{ display:flex; flex-direction:column; gap:10px; width:100%; }

  /* ---------- Loader ---------- */
  .loader{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; text-align:center; }
  .spin{ width:38px; height:38px; border-radius:50%; border:3px solid var(--card-edge); border-top-color:var(--gold); animation:spin 1s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .loader-msg{ color:var(--ink-dim); font-size:.9rem; max-width:300px; }

  footer{ text-align:center; color:var(--ink-dim); font-size:.7rem; margin-top:14px; }
  .link-note{ text-align:center; margin-top:12px; }
  .link-note a{ color:var(--gold); font-size:.82rem; text-decoration:none; }
  .link-note a:hover{ text-decoration:underline; }
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="spin"></div>
  <div class="loader-msg" id="loader-msg">Chargement du vocabulaire…</div>
</div>

<div class="setup hidden" id="setup">
  <header>
    <div class="brand"><span class="he">כַּרְטִיסִיָּה</span> · Flashcards Hébreu</div>
    <div class="tagline">Réviser le vocabulaire du carnet</div>
  </header>

  <div class="panel">
    <h2>Rechercher un mot</h2>
    <div class="search-wrap">
      <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Chercher (français, hébreu, translittération)…">
      <button class="search-clear" id="search-clear" aria-label="Effacer" hidden>&times;</button>
    </div>
    <div class="search-results" id="search-results"></div>

    <h2>Catégories</h2>
    <div class="cat-row">
      <button class="selall" id="sel-all">Tout</button>
      <button class="selall" id="sel-none">Aucun</button>
    </div>
    <div class="chips" id="cats"></div>

    <h2>Sens</h2>
    <div class="seg" id="dir">
      <button class="chip" data-dir="he2fr" aria-pressed="true">Hébreu → Français</button>
      <button class="chip" data-dir="fr2he" aria-pressed="false">Français → Hébreu</button>
    </div>

    <h2>Mode</h2>
    <div class="seg" id="mode">
      <button class="chip" data-mode="cards" aria-pressed="true">Cartes</button>
      <button class="chip" data-mode="input" aria-pressed="false">Saisie</button>
    </div>

    <h2>Écriture hébraïque</h2>
    <div class="seg" id="script">
      <button class="chip" data-script="nikud" aria-pressed="true">Avec nikud</button>
      <button class="chip" data-script="plain" aria-pressed="false">Sans nikud</button>
      <button class="chip" data-script="cursive" aria-pressed="false">Cursive</button>
    </div>

    <h2>Ordre</h2>
    <div class="seg" id="order">
      <button class="chip" data-order="shuffle" aria-pressed="true">Aléatoire</button>
      <button class="chip" data-order="linear" aria-pressed="false">Dans l'ordre</button>
    </div>

    <h2>Audio</h2>
    <div class="seg" id="audio">
      <button class="chip" data-audio="tap" aria-pressed="true">Au clic</button>
      <button class="chip" data-audio="auto" aria-pressed="false">Automatique</button>
      <button class="chip" data-audio="off" aria-pressed="false">Aucun</button>
    </div>

    <button class="start" id="start">Commencer</button>
    <div class="link-note"><a href="./vocabulaire_hebreu.html">Ouvrir le carnet de vocabulaire complet ↗</a></div>
    <footer id="count-note"></footer>
  </div>
</div>

<div class="study" id="study">
  <div class="progress-wrap">
    <button class="exit" id="exit" aria-label="Quitter">&times;</button>
    <div class="bar"><span id="barfill"></span></div>
    <div class="counter" id="counter">0 / 0</div>
  </div>

  <div class="stage">
    <div class="flip" id="card">
      <div class="face" id="face">
        <button class="speak-btn" id="speak-btn" aria-label="Écouter">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>
        </button>
        <div id="face-content"></div>
      </div>
    </div>
  </div>

  <div id="card-controls">
    <button class="btn-flip" id="btn-flip">Retourner</button>
    <div class="actions hidden-btns" id="answer-btns">
      <button class="btn btn-bad" id="btn-again">Je révise ↺</button>
      <button class="btn btn-good" id="btn-good">Je savais ✓</button>
    </div>
  </div>

  <div class="input-wrap" id="input-wrap" style="display:none;">
    <input id="answer-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Ta réponse…">
    <div class="input-row" id="input-row"><button class="btn-flip" id="btn-check">Vérifier</button></div>
    <div class="feedback" id="feedback"></div>
    <div class="input-row hide" id="next-row" style="margin-top:10px;"><button class="btn-flip" id="btn-next">Suivant →</button></div>
  </div>
</div>

<div class="done" id="done">
  <div class="score-ring"><div class="score" id="score">0<small>/0</small></div></div>
  <h2 id="done-title">Session terminée</h2>
  <p id="done-msg"></p>
  <div class="done-btns">
    <button class="btn-flip" id="retry-missed">Revoir les ratées</button>
    <button class="btn btn-good" id="retry-all" style="flex:none;">Rejouer tout</button>
    <button class="chip" id="back-setup" style="margin:0 auto;">Retour aux réglages</button>
  </div>
</div>

<script>
let CARDS = [];
const state = {
  cats:new Set(), dir:'he2fr', mode:'cards', script:'nikud', order:'shuffle', audio:'tap',
  queue:[], idx:0, total:0, goodCount:0, missed:[], flipped:false
};
let TTS_OK = false, HE_VOICE = null;

/* ---------- Text-to-speech (Carmit if available) ---------- */
function initTTS(){
  if(!('speechSynthesis' in window)) return;
  TTS_OK = true;
  function pick(){
    const vs = speechSynthesis.getVoices();
    HE_VOICE = vs.find(v=>/he[-_]?IL/i.test(v.lang)&&/carmit/i.test(v.name))
            || vs.find(v=>/he[-_]?IL/i.test(v.lang))
            || vs.find(v=>/hebrew/i.test(v.name)) || null;
  }
  pick();
  if(speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = pick;
}
function speak(text){
  if(!TTS_OK || state.audio==='off') return;
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if(HE_VOICE) u.voice = HE_VOICE;
    u.lang = HE_VOICE ? HE_VOICE.lang : 'he-IL';
    u.rate = 0.88;
    speechSynthesis.speak(u);
  }catch(e){}
}
initTTS();

/* ---------- helpers ---------- */
function stripNikud(s){ return s.replace(/[\u0591-\u05C7]/g,''); }
function heDisplay(card, big){
  if(state.script==='plain') return card.he_plain || stripNikud(card.he);
  return card.he;
}
function cursiveClass(){ return state.script==='cursive' ? 'he-cursive' : ''; }

/* ---------- Setup interactions ---------- */
function segClick(groupId, key){
  const g = document.getElementById(groupId);
  g.querySelectorAll('.chip').forEach(c=>{
    const on = c.dataset[key]===state[key];
    c.setAttribute('aria-pressed', on?'true':'false');
  });
}
['dir','mode','script','order','audio'].forEach(key=>{
  const map={dir:'dir',mode:'mode',script:'script',order:'order',audio:'audio'};
  document.getElementById(key).addEventListener('click', e=>{
    const btn=e.target.closest('.chip'); if(!btn) return;
    state[key]=btn.dataset[key];
    segClick(key,key);
    if(key==='mode') updateModeUI();
  });
});

function buildChips(){
  const cats = [...new Set(CARDS.map(c=>c.cat))];
  const box = document.getElementById('cats'); box.innerHTML='';
  cats.forEach(cat=>{
    const n = CARDS.filter(c=>c.cat===cat).length;
    const b=document.createElement('button');
    b.className='chip'; b.dataset.cat=cat; b.setAttribute('aria-pressed','true');
    b.innerHTML=cat+'<span class="n">'+n+'</span>';
    b.onclick=()=>{ b.setAttribute('aria-pressed', b.getAttribute('aria-pressed')==='true'?'false':'true'); syncCats(); updateStart(); };
    box.appendChild(b);
  });
  syncCats();
}
function syncCats(){
  state.cats = new Set([...document.querySelectorAll('#cats .chip')]
    .filter(c=>c.getAttribute('aria-pressed')==='true').map(c=>c.dataset.cat));
}
document.getElementById('sel-all').onclick=()=>{ document.querySelectorAll('#cats .chip').forEach(c=>c.setAttribute('aria-pressed','true')); syncCats(); updateStart(); };
document.getElementById('sel-none').onclick=()=>{ document.querySelectorAll('#cats .chip').forEach(c=>c.setAttribute('aria-pressed','false')); syncCats(); updateStart(); };

function updateModeUI(){
  const input = state.mode==='input';
  document.getElementById('card-controls').style.display = input?'none':'block';
  document.getElementById('input-wrap').style.display = input?'block':'none';
}
function updateStart(){
  const n = CARDS.filter(c=>state.cats.has(c.cat)).length;
  const btn=document.getElementById('start');
  btn.disabled = n===0;
  btn.textContent = n===0 ? 'Choisis au moins une catégorie' : 'Commencer ('+n+' mots)';
}

/* ---------- Search ---------- */
function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f\u0591-\u05C7]/g,'').replace(/\s+/g,' ').trim(); }
const searchInput=document.getElementById('search-input');
const searchClear=document.getElementById('search-clear');
const searchResults=document.getElementById('search-results');
function speakIcon(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg>'; }
function runSearch(){
  const q=norm(searchInput.value);
  searchClear.hidden = searchInput.value.length===0;
  if(!q){ searchResults.innerHTML=''; return; }
  const hits=CARDS.map(c=>{
    const hay=norm([c.he,c.he_plain,c.tr,c.fr,(c.forms||[]).map(f=>f.he+' '+f.tr).join(' ')].join(' '));
    return hay.indexOf(q)!==-1 ? c : null;
  }).filter(Boolean).slice(0,40);
  if(!hits.length){ searchResults.innerHTML='<div class="search-empty">Aucun résultat.</div>'; return; }
  searchResults.innerHTML='<div class="sr-count">'+hits.length+' résultat'+(hits.length>1?'s':'')+'</div>';
  hits.forEach(c=>{
    const hasForms = c.forms && c.forms.length;
    const item=document.createElement('div');
    item.className='sr-item';
    const row=document.createElement('div');
    row.className='sr-row';
    row.innerHTML=
      '<button class="sr-speak" aria-label="Écouter">'+speakIcon()+'</button>'+
      '<div class="sr-body"><div><span class="sr-he">'+c.he+'</span>'+(c.tr?'<span class="sr-tr">'+c.tr+'</span>':'')+'</div><div class="sr-fr">'+c.fr+'</div></div>'+
      '<span class="sr-cat">'+c.cat+'</span>'+
      (hasForms?'<span class="sr-chev">›</span>':'');
    item.appendChild(row);
    row.querySelector('.sr-speak').addEventListener('click', e=>{ e.stopPropagation(); speak(c.he); });
    if(hasForms){
      const det=document.createElement('div');
      det.className='sr-detail';
      let h='<div class="srd-title">Formes</div><div class="srd-forms">';
      c.forms.forEach(f=>{ h+='<div class="srd-f"><span class="srd-he">'+f.he+'</span><span class="srd-lbl">'+f.label+'</span></div>'; });
      h+='</div>';
      if(c.note) h+='<div class="srd-note">'+c.note+'</div>';
      det.innerHTML=h;
      item.appendChild(det);
      row.addEventListener('click', ()=> item.classList.toggle('open'));
    } else if(c.note){
      const det=document.createElement('div');
      det.className='sr-detail';
      det.innerHTML='<div class="srd-note" style="margin-top:12px">'+c.note+'</div>';
      item.appendChild(det);
      row.addEventListener('click', ()=> item.classList.toggle('open'));
    }
    searchResults.appendChild(item);
  });
}
searchInput.addEventListener('input', runSearch);
searchClear.addEventListener('click', ()=>{ searchInput.value=''; runSearch(); searchInput.focus(); });

/* ---------- Start / study ---------- */
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function start(){
  const pool = CARDS.filter(c=>state.cats.has(c.cat));
  if(!pool.length) return;
  state.queue = state.order==='shuffle' ? shuffle(pool.slice()) : pool.slice();
  state.idx=0; state.total=state.queue.length; state.goodCount=0; state.missed=[]; state.flipped=false;
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('done').classList.remove('active');
  document.getElementById('study').classList.add('active');
  updateModeUI();
  render();
}
bindTap(document.getElementById('start'), start);

function currentCard(){ return state.queue[state.idx]; }
function updateProgress(){
  document.getElementById('counter').textContent=(state.idx+1)+' / '+state.total;
  document.getElementById('barfill').style.width=((state.idx)/state.total*100)+'%';
}
function speakerSVG(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>'; }
let speakBtn=document.getElementById('speak-btn');
function updateSpeaker(){
  const c=currentCard(); if(!c) return;
  const showHe = (state.dir==='he2fr') || state.flipped || state.mode==='input';
  speakBtn.style.display = (TTS_OK && state.audio!=='off' && showHe) ? 'flex' : 'none';
}
function speakCurrent(){ const c=currentCard(); if(c) speak(c.he); }
bindTap(speakBtn, ()=>{ speakCurrent(); });

function faceFront(c){
  updateSpeaker();
  if(state.dir==='he2fr'){
    const he=heDisplay(c,true);
    return '<div class="eyebrow">'+c.cat+'</div><div class="he-big '+cursiveClass()+'">'+he+'</div>'+
      (state.audio!=='off'?'<div class="hint">tape pour retourner</div>':'<div class="hint">tape pour retourner</div>');
  } else {
    return '<div class="eyebrow">'+c.cat+'</div><div class="fr-big">'+c.fr+'</div><div class="hint">tape pour retourner</div>';
  }
}
function faceBack(c){
  updateSpeaker();
  let inner='';
  if(state.dir==='he2fr'){
    inner='<div class="fr-big">'+c.fr+'</div>';
    if(c.tr) inner+='<div class="tr-big">'+c.tr+'</div>';
  } else {
    const he=heDisplay(c,true);
    inner='<div class="he-big '+cursiveClass()+'">'+he+'</div>';
    if(c.tr) inner+='<div class="tr-big">'+c.tr+'</div>';
  }
  if(c.forms && c.forms.length){
    inner+='<div class="divider"></div><div class="forms">';
    c.forms.forEach(f=>{
      const fhe = state.script==='plain' ? (f.he_plain||stripNikud(f.he)) : f.he;
      inner+='<div class="form-cell"><span class="fhe '+cursiveClass()+'">'+fhe+'</span><span class="flbl">'+f.label+'</span></div>';
    });
    inner+='</div>';
  }
  if(c.note) inner+='<div class="note-line">'+c.note+'</div>';
  return inner;
}
function render(){
  const c=currentCard(); if(!c){ finish(); return; }
  state.flipped=false;
  updateProgress();
  if(state.mode==='input'){ renderInput(c); return; }
  document.getElementById('face-content').innerHTML=faceFront(c);
  document.getElementById('btn-flip').style.display='block';
  document.getElementById('answer-btns').classList.add('hidden-btns');
  document.getElementById('answer-btns').style.display='none';
  if(state.audio==='auto' && state.dir==='he2fr') speakCurrent();
}
function doFlip(){
  const c=currentCard(); if(!c) return;
  state.flipped=!state.flipped;
  document.getElementById('face-content').innerHTML = state.flipped?faceBack(c):faceFront(c);
  if(state.flipped){
    document.getElementById('btn-flip').style.display='none';
    const ab=document.getElementById('answer-btns');
    ab.classList.remove('hidden-btns'); ab.style.display='flex';
    if(state.audio==='auto' && state.dir==='fr2he') speakCurrent();
  } else {
    document.getElementById('btn-flip').style.display='block';
    document.getElementById('answer-btns').classList.add('hidden-btns');
    document.getElementById('answer-btns').style.display='none';
  }
}
bindTap(document.getElementById('card'), (e)=>{ if(e.target.closest('.speak-btn')) return; if(state.mode!=='input') doFlip(); });
bindTap(document.getElementById('btn-flip'), doFlip);
function answer(good){
  const c=currentCard();
  if(good) state.goodCount++; else state.missed.push(c);
  state.idx++;
  if(state.idx>=state.total) finish(); else render();
}
bindTap(document.getElementById('btn-good'), ()=>answer(true));
bindTap(document.getElementById('btn-again'), ()=>answer(false));

/* ---------- Input mode ---------- */
function normFr(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\u0590-\u05ff\s]/g,'').replace(/\s+/g,' ').trim();
}
function frVariants(fr){
  let base=fr.replace(/\([^)]*\)/g,' ');
  base=base.replace(/\[[^\]]*\]/g,' ');
  const parts=base.split(/[\/,;]|\bou\b/).map(s=>normFr(s)).filter(Boolean);
  const out=new Set();
  parts.forEach(p=>{
    out.add(p);
    out.add(p.replace(/^(le |la |les |un |une |des |l'|d'|se |s'|à |au |aux )/,'').trim());
    out.add(p.replace(/^\((infinitif|inf)\)\s*/,'').trim());
  });
  return [...out].filter(Boolean);
}
function editDist(a,b){
  const m=a.length,n=b.length; if(!m)return n; if(!n)return m;
  const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];
}
function checkFr(input, fr){
  const g=normFr(input); if(!g) return false;
  const vars=frVariants(fr);
  for(const v of vars){ if(g===v) return true; if(v.length>4 && editDist(g,v)<=1) return true; }
  return false;
}
function checkHe(input, card){
  const g=stripNikud((input||'').trim());
  if(!g) return false;
  if(g===stripNikud(card.he)) return true;
  if(card.he_plain && g===card.he_plain) return true;
  const t=normFr(input);
  if(t && card.tr && t===normFr(card.tr)) return true;
  return false;
}
function answerHtml(card){
  let h='<div class="correct-answer"><span class="he">'+card.he+'</span>';
  if(card.tr) h+='<div class="tr">'+card.tr+'</div>';
  h+='<div class="sub" style="margin-top:6px">'+card.fr+'</div></div>';
  return h;
}
function renderInput(c){
  document.getElementById('face-content').innerHTML =
    state.dir==='he2fr'
      ? '<div class="eyebrow">'+c.cat+'</div><div class="he-big '+cursiveClass()+'">'+heDisplay(c,true)+'</div>'
      : '<div class="eyebrow">'+c.cat+'</div><div class="fr-big">'+c.fr+'</div>';
  updateSpeaker();
  const inp=document.getElementById('answer-input');
  inp.value=''; inp.className=''; inp.disabled=false;
  inp.placeholder = state.dir==='he2fr' ? 'Réponse en français…' : 'Réponse en hébreu ou translittération…';
  document.getElementById('input-row').classList.remove('hide');
  document.getElementById('next-row').classList.add('hide');
  document.getElementById('feedback').innerHTML='';
  setTimeout(()=>inp.focus(),50);
  if(state.audio==='auto' && state.dir==='he2fr') speakCurrent();
}
function submitAnswer(){
  const c=currentCard(); if(!c) return;
  const inp=document.getElementById('answer-input');
  const val=inp.value;
  const correct = state.dir==='he2fr' ? checkFr(val,c.fr) : checkHe(val,c);
  inp.disabled=true;
  inp.classList.add(correct?'ok':'no');
  document.getElementById('input-row').classList.add('hide');
  const fb=document.getElementById('feedback');
  fb.innerHTML = (correct
      ? '<div class="verdict ok">✓ Correct</div>'
      : '<div class="verdict no">✗ Réponse&nbsp;:</div>') + answerHtml(c);
  document.getElementById('next-row').classList.remove('hide');
  if(correct) state.goodCount++; else state.missed.push(c);
  updateSpeaker();
  if(TTS_OK && (state.audio==='auto' || state.dir==='fr2he')) speakCurrent();
}
function nextAfterInput(){
  state.idx++;
  if(state.idx>=state.queue.length) finish();
  else render();
}
bindTap(document.getElementById('btn-check'), submitAnswer);
bindTap(document.getElementById('btn-next'), nextAfterInput);
document.getElementById('answer-input').addEventListener('keydown', e=>{
  if(e.key==='Enter'){ e.preventDefault(); submitAnswer(); }
});

function finish(){
  document.getElementById('study').classList.remove('active');
  document.getElementById('done').classList.add('active');
  document.getElementById('barfill').style.width='100%';
  const el=document.getElementById('score');
  el.innerHTML=state.goodCount+'<small>/'+state.total+'</small>';
  const pct=Math.round(state.goodCount/state.total*100);
  let msg;
  if(pct===100) msg='Sans faute. כָּל הַכָּבוֹד !';
  else if(pct>=70) msg=state.missed.length+' carte'+(state.missed.length>1?'s':'')+' à revoir.';
  else msg='Encore un peu d\'entraînement — '+state.missed.length+' à revoir.';
  document.getElementById('done-msg').textContent=msg;
  document.getElementById('retry-missed').style.display = state.missed.length? 'inline-block':'none';
}

document.getElementById('retry-missed').onclick=()=>{
  state.queue = state.order==='shuffle'? shuffle(state.missed.slice()):state.missed.slice();
  state.idx=0; state.total=state.queue.length; state.missed=[]; state.goodCount=0;
  document.getElementById('done').classList.remove('active');
  document.getElementById('study').classList.add('active');
  render();
};
document.getElementById('retry-all').onclick=start;
document.getElementById('back-setup').onclick=()=>{
  document.getElementById('done').classList.remove('active');
  document.getElementById('study').classList.remove('active');
  document.getElementById('setup').classList.remove('hidden');
};
document.getElementById('exit').onclick=()=>{
  document.getElementById('study').classList.remove('active');
  document.getElementById('setup').classList.remove('hidden');
};

// keyboard
document.addEventListener('keydown', e=>{
  if(!document.getElementById('study').classList.contains('active')) return;
  if(state.mode==='input') return;
  if(e.code==='Space'){ e.preventDefault(); doFlip(); }
  else if(state.flipped && e.code==='ArrowRight'){ answer(true); }
  else if(state.flipped && e.code==='ArrowLeft'){ answer(false); }
});

// ---------- Runtime extraction from the vocab notebook ----------
function stripNikud(s){ return s.replace(/[\u0591-\u05C7]/g,''); }
function firstText(el, sel){ const x = el.querySelector(sel); return x ? x.textContent.trim() : ''; }

function extractCards(doc){
  const cards = [];
  const sections = {};
  doc.querySelectorAll('h2').forEach(h2=>{
    const c = h2.querySelector('.count'); if(!c) return;
    const name = c.textContent.trim();
    const els = []; let n = h2.nextElementSibling;
    while(n && n.tagName!=='H2'){ els.push(n); n = n.nextElementSibling; }
    sections[name] = els;
  });
  function rowsOf(name){
    const out=[]; (sections[name]||[]).forEach(el=>{
      if(el.querySelectorAll) el.querySelectorAll('table tbody tr').forEach(tr=>out.push(tr));
    }); return out;
  }
  function lisOf(name){
    const out=[]; (sections[name]||[]).forEach(el=>{
      if(el.matches && el.matches('ul.word-list')) el.querySelectorAll(':scope > li').forEach(li=>out.push(li));
      else if(el.querySelectorAll) el.querySelectorAll('ul.word-list > li').forEach(li=>out.push(li));
    }); return out;
  }
  rowsOf('Verbes').forEach(tr=>{
    const tds=[...tr.children]; if(tds.length<5) return;
    const he=firstText(tds[0],'.he'); const fr=firstText(tds[0],'.fr');
    const labels=['il','elle','ils','elles']; const forms=[];
    for(let i=1;i<5;i++){ const fhe=firstText(tds[i],'.he'); const ftr=firstText(tds[i],'.tr');
      forms.push({he:fhe,tr:ftr,label:labels[i-1],he_plain:stripNikud(fhe)}); }
    if(he) cards.push({cat:'Verbes',he,tr:'',fr:'(infinitif) '+fr,forms});
  });
  rowsOf('Adjectifs').forEach(tr=>{
    const tds=[...tr.children]; if(tds.length<4) return;
    const he=firstText(tds[0],'.he'); const fr=firstText(tds[0],'.fr');
    const labels=['f. sing.','m. plur.','f. plur.']; const forms=[];
    for(let i=1;i<4;i++){ const fhe=firstText(tds[i],'.he'); const ftr=firstText(tds[i],'.tr');
      if(fhe) forms.push({he:fhe,tr:ftr,label:labels[i-1],he_plain:stripNikud(fhe)}); }
    if(he) cards.push({cat:'Adjectifs',he,tr:'',fr, forms});
  });
  rowsOf('Noms').forEach(tr=>{
    const tds=[...tr.children]; if(tds.length<3) return;
    const he=firstText(tds[0],'.he'); const fr=firstText(tds[0],'.fr');
    const genre=tds[1].textContent.trim();
    const plHe=firstText(tds[2],'.he'); const plTr=firstText(tds[2],'.tr');
    const card={cat:'Noms',he,tr:'',fr:fr+((genre==='m'||genre==='f')?(' ('+genre+')'):'')};
    if(genre==='m'||genre==='f') card.genre=genre;
    if(plHe && plHe!=='—'){ card.forms=[{he:plHe,tr:plTr,label:'pluriel',he_plain:stripNikud(plHe)}]; }
    if(he) cards.push(card);
  });
  const listCats={'Pronoms personnels':'Pronoms personnels','Démonstratifs':'Démonstratifs',
    'Prépositions':'Prépositions','Conjonctions':'Conjonctions','Mots interrogatifs':'Mots interrogatifs',
    'Nombres (0–10)':'Nombres','Jours de la semaine':'Jours de la semaine',
    'Mots de quantité':'Mots de quantité','Expressions / Divers':'Expressions',
    'Existence et possession':'Existence'};
  Object.keys(listCats).forEach(sec=>{
    lisOf(sec).forEach(li=>{
      const he=firstText(li,'.he'); if(!he) return;
      cards.push({cat:listCats[sec],he,tr:firstText(li,'.tr'),fr:firstText(li,'.fr')});
    });
  });
  const trim={
    'וַאלָה':['vraiment ?!','étonnement — à ne pas confondre avec יָאלְלָה'],
    'תַּחַת':['sous',"littéraire — à l'oral on dit plutôt מִתַּחַת לְ"],
    'קְצָת':['un peu',"courant à l'oral, = מְעַט"],
    'הַאִם':['est-ce que','marque la question oui/non']
  };
  cards.forEach(c=>{ c.he_plain=stripNikud(c.he); if(trim[c.he]){ c.fr=trim[c.he][0]; c.note=trim[c.he][1]; } });
  return cards;
}

async function init(){
  const loader=document.getElementById('loader');
  const msg=document.getElementById('loader-msg');
  try{
    const res = await fetch('./vocabulaire_hebreu.html', {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text = await res.text();
    const doc = new DOMParser().parseFromString(text, 'text/html');
    CARDS = extractCards(doc);
    if(!CARDS.length) throw new Error('empty');
    buildChips();
    updateStart();
    loader.style.display='none';
    document.getElementById('setup').classList.remove('hidden');
    document.getElementById('count-note').textContent = CARDS.length + ' mots chargés depuis le carnet';
  }catch(err){
    msg.innerHTML = "Impossible de charger le vocabulaire.<br><span style='font-size:.8rem;opacity:.7'>Ouvre cette page via son lien en ligne (GitHub Pages), pas en fichier local.</span>";
    document.querySelector('#loader .spin').style.display='none';
  }
}
init();

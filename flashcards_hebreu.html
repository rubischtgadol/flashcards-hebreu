<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Hébreu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700&family=Assistant:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playpen+Sans+Hebrew:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1620; --bg2:#151f2b; --card:#1c2733; --card-edge:#26333f;
    --ink:#ece3d2; --ink-dim:#8b96a3; --gold:#d9a441; --gold-soft:#e8c583;
    --green:#5bbd7a; --red:#d96a5b; --line:#28333f;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:radial-gradient(120% 80% at 50% 0%, var(--bg2), var(--bg) 70%);
    color:var(--ink);
    font-family:'Assistant','Arial Hebrew','Helvetica Neue',Arial,sans-serif;
    font-size:22px;   /* base agrandie (+12% vs 16px) */
    min-height:100dvh;
    display:flex; flex-direction:column;
    padding:16px 14px 26px;
  }
  @media (prefers-reduced-motion: reduce){ *{transition:none !important; animation:none !important;} }

  /* ---------- Header ---------- */
  header{ text-align:center; margin-bottom:10px; }
  .brand{
    font-family:'Frank Ruhl Libre','David Libre','Times New Roman',serif; font-weight:700;
    font-size:1.5rem; letter-spacing:.01em;
  }
  .brand .he{ color:var(--gold); }
  .tagline{ color:var(--ink-dim); font-size:.92rem; margin-top:1px; }

  /* ---------- Setup panel ---------- */
  .panel{
    background:linear-gradient(180deg, var(--card), var(--bg2));
    border:1px solid var(--card-edge); border-radius:16px;
    padding:16px 15px; max-width:520px; width:100%; margin:8px auto 0;
  }
  .panel h2{
    font-family:'Assistant','Arial Hebrew','Helvetica Neue',Arial,sans-serif; font-size:.84rem; font-weight:700;
    text-transform:uppercase; letter-spacing:.12em; color:var(--gold);
    margin:0 0 9px;
  }
  .panel h2:not(:first-of-type){ margin-top:18px; }

  /* ---------- Search ---------- */
  .search-wrap{ position:relative; margin-bottom:4px; }
  .search-ico{ position:absolute; left:13px; top:50%; transform:translateY(-50%); width:18px; height:18px; color:var(--ink-dim); pointer-events:none; }
  #search-input{
    width:100%; border-radius:12px; border:1px solid var(--line);
    background:var(--bg2); color:var(--ink); font-family:inherit; font-size:1rem;
    padding:12px 38px 12px 40px; outline:none; transition:border-color .15s ease;
  }
  #search-input:focus{ border-color:var(--gold); }
  .search-clear{
    position:absolute; right:8px; top:50%; transform:translateY(-50%);
    width:28px; height:28px; border-radius:50%; border:none; background:transparent;
    color:var(--ink-dim); font-size:1.3rem; line-height:1; cursor:pointer;
  }
  .search-results{ margin:10px 0 4px; display:flex; flex-direction:column; gap:6px; max-height:340px; overflow-y:auto; }
  .sr-count{ font-size:.84rem; color:var(--ink-dim); padding:2px 2px 4px; }
  .sr-row{
    display:flex; align-items:center; gap:11px; padding:9px 11px;
    border:1px solid var(--line); border-radius:11px; background:var(--bg2); cursor:pointer;
    transition:border-color .12s ease;
  }
  .sr-row:hover{ border-color:var(--gold); }
  .sr-speak{
    flex:none; width:34px; height:34px; border-radius:50%;
    border:1px solid var(--line); background:transparent; color:var(--gold);
    display:flex; align-items:center; justify-content:center; padding:0;
  }
  .sr-speak svg{ width:17px; height:17px; }
  .sr-body{ flex:1; min-width:0; }
  .sr-he{ font-family:'Frank Ruhl Libre','David Libre','Times New Roman',serif; font-size:1.3rem; direction:rtl; }
  .sr-tr{ font-family:'JetBrains Mono',monospace; font-size:.84rem; color:var(--ink-dim); margin-inline-start:8px; }
  .sr-fr{ color:var(--ink); font-size:.9rem; margin-top:1px; }
  .sr-cat{ flex:none; font-size:.72rem; text-transform:uppercase; letter-spacing:.08em; color:var(--gold); border:1px solid var(--line); border-radius:999px; padding:3px 9px; white-space:nowrap; }
  .search-empty{ color:var(--ink-dim); font-size:.95rem; padding:10px 2px; }
  .sr-item{ border:1px solid var(--line); border-radius:11px; background:var(--bg2); overflow:hidden; }
  .sr-item .sr-row{ border:none; border-radius:0; background:transparent; }
  .sr-item.open{ border-color:var(--gold); }
  .sr-chev{ flex:none; color:var(--ink-dim); font-size:1.3rem; line-height:1; transition:transform .18s ease; }
  .sr-item.open .sr-chev{ transform:rotate(90deg); color:var(--gold); }
  .sr-detail{ padding:2px 12px 12px 12px; border-top:1px dashed var(--line); margin:0 0 2px; }
  .srd-title{ font-size:.76rem; text-transform:uppercase; letter-spacing:.1em; color:var(--gold); margin:10px 0 7px; }
  .srd-forms{ display:grid; grid-template-columns:1fr 1fr; gap:6px 16px; direction:rtl; }
  .srd-f{ display:flex; align-items:baseline; gap:7px; }
  .srd-he{ font-family:'Frank Ruhl Libre','David Libre','Times New Roman',serif; font-size:1.15rem; direction:rtl; }
  .srd-lbl{ font-family:'JetBrains Mono',monospace; font-size:.78rem; color:var(--ink-dim); direction:ltr; }
  .srd-note{ font-size:.8rem; color:var(--ink-dim); font-style:italic; margin-top:10px; direction:ltr; }
  .chips{ display:flex; flex-wrap:wrap; gap:7px; }
  .chip{
    border:1px solid var(--line); background:transparent; color:var(--ink);
    font-family:inherit; font-size:.96rem; padding:7px 13px; border-radius:999px;
    cursor:pointer; transition:all .15s ease; user-select:none;
  }
  .chip:hover{ border-color:var(--gold); }
  .chip[aria-pressed="true"]{
    background:var(--gold); color:#1a1206; border-color:var(--gold); font-weight:600;
  }
  .chip .n{ opacity:.6; font-size:.76em; margin-inline-start:5px; }
  .chip[aria-pressed="true"] .n{ opacity:.7; }
  .seg{ display:flex; gap:7px; flex-wrap:wrap; }
  .cat-row{ display:flex; align-items:center; gap:8px; margin-bottom:9px; }
  .cat-row .chip{ font-size:.9rem; padding:5px 11px; }
  .selall{
    background:none; border:none; color:var(--gold); font-family:inherit;
    font-size:.9rem; cursor:pointer; text-decoration:underline; padding:0;
  }
  .start{
    margin-top:20px; width:100%; border:none; border-radius:12px;
    background:linear-gradient(180deg, var(--gold-soft), var(--gold));
    color:#1a1206; font-family:inherit; font-weight:700; font-size:1.02rem;
    padding:14px; cursor:pointer; letter-spacing:.01em;
    box-shadow:0 6px 18px -8px var(--gold);
  }
  .start:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; }

  /* ---------- Study screen ---------- */
  .study{ display:none; flex-direction:column; flex:1; max-width:520px; width:100%; margin:0 auto; }
  .study.active{ display:flex; }
  .setup.hidden{ display:none; }

  .progress-wrap{ display:flex; align-items:center; gap:12px; margin:6px 2px 16px; }
  .bar{ flex:1; height:5px; background:var(--line); border-radius:999px; overflow:hidden; }
  .bar > span{ display:block; height:100%; width:0; background:var(--gold); border-radius:999px; transition:width .35s ease; }
  .counter{ font-family:'JetBrains Mono',monospace; font-size:.88rem; color:var(--ink-dim); white-space:nowrap; }
  .exit{ background:none; border:none; color:var(--ink-dim); font-size:1.3rem; line-height:1; cursor:pointer; padding:0 2px; }

  /* ---------- The card ---------- */
  .stage{ flex:1; display:flex; align-items:center; justify-content:center; margin-bottom:4px; }
  .flip{
    position:relative; width:100%; max-width:420px;
    display:flex; flex-direction:column;
    border-radius:20px; border:1px solid var(--card-edge);
    background:linear-gradient(160deg, var(--card), var(--bg2));
    box-shadow:0 20px 50px -22px #000, inset 0 1px 0 rgba(255,255,255,.03);
    cursor:pointer; overflow:hidden;
    min-height:340px; max-height:520px; height:min(60vh,520px);
    transition:transform .12s ease;
  }
  .flip:active{ transform:scale(.994); }
  .face{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:44px 22px 40px; text-align:center; overflow-y:auto;
  }
  .face .eyebrow{
    position:absolute; top:16px; left:0; right:0;
    font-size:.8rem; letter-spacing:.14em; text-transform:uppercase;
    color:var(--gold); font-weight:600;
  }
  .face .hint{
    position:absolute; bottom:14px; left:0; right:0;
    font-size:.84rem; color:var(--ink-dim);
  }
  .speak-btn{
    position:absolute; top:12px; right:14px;
    width:40px; height:40px; border-radius:50%;
    border:1px solid var(--line); background:rgba(0,0,0,.18);
    color:var(--gold); display:flex; align-items:center; justify-content:center;
    cursor:pointer; padding:0; transition:transform .1s ease, color .15s ease, border-color .15s ease;
    z-index:2;
  }
  .speak-btn svg{ width:21px; height:21px; }
  .speak-btn:active{ transform:scale(.9); }
  .speak-btn.speaking{ color:var(--gold-soft); border-color:var(--gold); }
  .speak-btn.hide{ display:none !important; }
  .audio-note{ color:var(--ink-dim); font-size:.74rem; margin-top:8px; }
  .face.flip-anim{ animation:cardIn .26s ease; }
  @keyframes cardIn{ from{ opacity:.4; transform:translateY(4px); } to{ opacity:1; transform:none; } }

  .big-he{ font-family:'Frank Ruhl Libre','David Libre','Times New Roman',serif; font-size:3.1rem; line-height:1.15; direction:rtl; }
  .big-he.cursive{ font-family:'Playpen Sans Hebrew','Segoe Script','Comic Sans MS',cursive; font-weight:300; font-size:2.7rem; color:var(--gold-soft); }
  .big-fr{ font-size:1.9rem; font-weight:600; font-family:'Frank Ruhl Libre','David Libre','Times New Roman',serif; }
  .translit{ font-family:'JetBrains Mono',monospace; font-size:1rem; color:var(--ink-dim); margin-top:12px; direction:ltr; }
  .sub-he{ font-family:'Frank Ruhl Libre','David Libre','Times New Roman',serif; font-size:1.7rem; direction:rtl; margin-top:6px; }
  .sub-fr{ font-size:1.15rem; color:var(--ink); margin-top:10px; }
  .cursive-line{ font-family:'Playpen Sans Hebrew','Segoe Script','Comic Sans MS',cursive; font-weight:300; font-size:1.6rem; color:var(--gold-soft); direction:rtl; margin-top:8px; }
  .note-line{ font-size:.92rem; color:var(--ink-dim); margin-top:14px; max-width:90%; font-style:italic; }
  .forms{ margin-top:16px; display:grid; grid-template-columns:1fr 1fr; gap:6px 18px; direction:rtl; }
  .forms div{ font-size:.98rem; }
  .forms .f-he{ font-family:'Frank Ruhl Libre','David Libre','Times New Roman',serif; }
  .forms .f-lbl{ font-size:.92rem; color:var(--ink-dim); direction:ltr; }

  /* ---------- Answer controls ---------- */
  .controls{ display:flex; gap:10px; margin-top:18px; min-height:52px; }
  .controls button{
    flex:1; border-radius:12px; font-family:inherit; font-weight:600; font-size:.92rem;
    padding:13px; cursor:pointer; border:1px solid var(--line); background:var(--card); color:var(--ink);
    transition:all .13s ease;
  }
  .btn-flip{ background:linear-gradient(180deg,var(--gold-soft),var(--gold)); color:#1a1206; border:none; font-weight:700; }
  .btn-again{ border-color:var(--red); color:var(--red); }
  .btn-again:hover{ background:var(--red); color:#1a0d0a; }
  .btn-good{ border-color:var(--green); color:var(--green); }
  .btn-good:hover{ background:var(--green); color:#0a1a0f; }
  .hide{ display:none !important; }

  /* ---------- Input mode ---------- */
  .input-zone{ margin-top:18px; }
  .input-row{ display:flex; gap:10px; }
  #answer-input{
    flex:1; border-radius:12px; border:1px solid var(--line);
    background:var(--bg2); color:var(--ink); font-family:inherit; font-size:1.05rem;
    padding:13px 15px; outline:none; transition:border-color .15s ease;
  }
  #answer-input:focus{ border-color:var(--gold); }
  #answer-input.ok{ border-color:var(--green); }
  #answer-input.no{ border-color:var(--red); }
  #btn-check{
    border:none; border-radius:12px; font-family:inherit; font-weight:700; font-size:.95rem;
    padding:13px 20px; cursor:pointer;
    background:linear-gradient(180deg,var(--gold-soft),var(--gold)); color:#1a1206;
  }
  .btn-next{
    margin-top:14px; width:100%; border:none; border-radius:12px; font-family:inherit;
    font-weight:700; font-size:.98rem; padding:14px; cursor:pointer;
    background:linear-gradient(180deg,var(--gold-soft),var(--gold)); color:#1a1206;
  }
  .feedback{ margin-top:14px; text-align:center; font-size:1rem; min-height:1.2em; }
  .feedback .verdict{ font-weight:700; font-size:1.1rem; }
  .feedback .verdict.ok{ color:var(--green); }
  .feedback .verdict.no{ color:var(--red); }
  .feedback .answer{ margin-top:8px; color:var(--ink); }
  .feedback .answer .he{ font-family:'Frank Ruhl Libre','David Libre','Times New Roman',serif; font-size:1.5rem; direction:rtl; }
  .feedback .answer .tr{ font-family:'JetBrains Mono',monospace; font-size:.95rem; color:var(--ink-dim); }

  /* ---------- Done screen ---------- */
  .done{ display:none; flex-direction:column; align-items:center; justify-content:center; flex:1; text-align:center; max-width:520px; margin:0 auto; }
  .done.active{ display:flex; }
  .done .score{ font-family:'Frank Ruhl Libre','David Libre','Times New Roman',serif; font-size:3.4rem; color:var(--gold); }
  .done .score small{ font-size:1.4rem; color:var(--ink-dim); }
  .done p{ color:var(--ink-dim); margin:6px 0 24px; }
  .done .big-he{ font-size:2.2rem; margin-bottom:8px; }
  .again-btns{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .again-btns button{
    border-radius:12px; font-family:inherit; font-weight:600; font-size:.92rem; padding:12px 20px; cursor:pointer;
    border:1px solid var(--line); background:var(--card); color:var(--ink);
  }
  .again-btns .primary{ background:linear-gradient(180deg,var(--gold-soft),var(--gold)); color:#1a1206; border:none; }

  kbd{ font-family:'JetBrains Mono',monospace; font-size:.84rem; background:var(--line); padding:1px 5px; border-radius:4px; color:var(--ink-dim); }
  .kbd-hint{ text-align:center; color:var(--ink-dim); font-size:.84rem; margin-top:12px; }
  @media (max-width:480px){ .kbd-hint{ display:none; } .big-he{ font-size:2.6rem; } .big-fr{ font-size:1.6rem; } }
</style>
</head>
<body>

<header>
  <div class="brand"><span class="he">כַּרְטִיסִים</span> · Flashcards</div>
  <div class="tagline">Entraînement au vocabulaire hébreu</div>
</header>

<!-- ============ SETUP ============ -->
<section class="setup panel" id="setup">
  <div class="search-wrap">
    <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="search-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Rechercher un mot…">
    <button class="search-clear hide" id="search-clear" aria-label="Effacer">&times;</button>
  </div>
  <div class="search-results hide" id="search-results"></div>

  <h2>Catégories</h2>
  <div class="cat-row"><button class="selall" id="selall">tout sélectionner</button></div>
  <div class="chips" id="cats"></div>

  <h2>Mode</h2>
  <div class="seg" id="mode">
    <button class="chip" data-mode="cards" aria-pressed="true">Cartes</button>
    <button class="chip" data-mode="input" aria-pressed="false">Saisie ⌨️</button>
  </div>

  <h2>Sens de la carte</h2>
  <div class="seg" id="dir">
    <button class="chip" data-dir="he2fr" aria-pressed="true">Hébreu → Français</button>
    <button class="chip" data-dir="fr2he" aria-pressed="false">Français → Hébreu</button>
  </div>

  <h2>Écriture au recto</h2>
  <div class="seg" id="script">
    <button class="chip" data-script="nikud" aria-pressed="true">Avec nikud</button>
    <button class="chip" data-script="plain" aria-pressed="false">Sans nikud</button>
    <button class="chip" data-script="cursive" aria-pressed="false">Cursif</button>
  </div>

  <h2>Ordre</h2>
  <div class="seg" id="order">
    <button class="chip" data-order="shuffle" aria-pressed="true">Aléatoire</button>
    <button class="chip" data-order="linear" aria-pressed="false">Dans l'ordre</button>
  </div>

  <h2>Prononciation</h2>
  <div class="seg" id="audio">
    <button class="chip" data-audio="click" aria-pressed="true">Au clic 🔊</button>
    <button class="chip" data-audio="auto" aria-pressed="false">Automatique</button>
  </div>
  <div class="audio-note" id="audio-note"></div>

  <button class="start" id="start">Commencer</button>
</section>

<!-- ============ STUDY ============ -->
<section class="study" id="study">
  <div class="progress-wrap">
    <button class="exit" id="exit" title="Quitter">&times;</button>
    <div class="bar"><span id="barfill"></span></div>
    <div class="counter" id="counter">1 / 1</div>
  </div>

  <div class="stage">
    <div class="flip" id="flip">
      <div class="face" id="face">
        <div class="eyebrow" id="face-cat"></div>
        <button class="speak-btn hide" id="speak-btn" title="Écouter" aria-label="Écouter la prononciation">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19.5 5a9 9 0 0 1 0 14"/></svg>
        </button>
        <div id="face-content"></div>
        <div class="hint" id="face-hint">tap pour retourner</div>
      </div>
    </div>
  </div>

  <div class="controls" id="controls-cards">
    <button class="btn-flip" id="btn-flip">Voir la réponse</button>
    <button class="btn-again hide" id="btn-again">Je savais pas</button>
    <button class="btn-good hide" id="btn-good">Je savais</button>
  </div>

  <div class="input-zone hide" id="input-zone">
    <div class="input-row" id="input-row">
      <input id="answer-input" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="Ta réponse…">
      <button id="btn-check">Vérifier</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next hide" id="btn-next">Suivant →</button>
  </div>

  <div class="kbd-hint" id="kbd-hint"><kbd>espace</kbd> retourner · <kbd>&larr;</kbd> je savais pas · <kbd>&rarr;</kbd> je savais</div>
</section>

<!-- ============ DONE ============ -->
<section class="done" id="done">
  <div class="score" id="score">0<small>/0</small></div>
  <p id="done-msg"></p>
  <div class="again-btns">
    <button class="primary" id="retry-missed">Rejouer les ratées</button>
    <button id="retry-all">Recommencer</button>
    <button id="back-setup">Changer de réglages</button>
  </div>

// ----- Speech (Web Speech API) -----
const TTS_OK = ('speechSynthesis' in window) && ('SpeechSynthesisUtterance' in window);
let voicesCache = [];
let heVoice = null;
function loadVoices(){
  if(!TTS_OK) return;
  voicesCache = window.speechSynthesis.getVoices() || [];
  // All Hebrew voices (match by BCP-47 lang he/iw, or by name).
  const heVoices = voicesCache.filter(v=>
    /^(he|iw)(-|$)/i.test(v.lang) || /hebrew|עברית|carmit/i.test(v.name)
  );
  // Rank: prefer higher-quality named variants (Premium > Enhanced > default),
  // and prefer a real Carmit voice when present.
  function score(v){
    const n = (v.name||'').toLowerCase();
    let s = 0;
    if(/premium/.test(n)) s += 40;
    else if(/enhanced|neural|siri/.test(n)) s += 25;
    if(/carmit/.test(n)) s += 10;
    if(v.localService) s += 3;      // on-device (Carmit) over remote fallback
    if(/^he(-|$)/i.test(v.lang)) s += 2;
    return s;
  }
  heVoice = heVoices.sort((a,b)=>score(b)-score(a))[0] || null;
}
if(TTS_OK){ loadVoices(); window.speechSynthesis.onvoiceschanged = loadVoices; }
function speak(text){
  if(!TTS_OK || !text) return;
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = heVoice ? heVoice.lang : 'he-IL';
    if(heVoice) u.voice = heVoice;
    u.rate = 0.88;
    const btn = document.getElementById('speak-btn');
    u.onstart = ()=>{ if(btn) btn.classList.add('speaking'); };
    u.onend   = ()=>{ if(btn) btn.classList.remove('speaking'); };
    u.onerror = ()=>{ if(btn) btn.classList.remove('speaking'); };
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function speakCurrent(){
  const c = state.queue[state.idx];
  // Prefer the vocalized form (with nikud) so the voice pronounces the exact vowels;
  // fall back to the plain form if no vocalized text is present.
  if(c) speak(c.he || c.he_plain);
}
function updateSpeaker(){
  const btn = document.getElementById('speak-btn');
  if(!btn) return;
  let hebrewVisible;
  if(state.mode==='input'){
    hebrewVisible = (state.dir==='he2fr') || (state.dir==='fr2he' && state.answered);
  } else {
    hebrewVisible = state.flipped || state.dir==='he2fr';
  }
  btn.classList.toggle('hide', !(TTS_OK && hebrewVisible));
}

// ----- Dynamic search over the word bank -----
const SPK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19.5 5a9 9 0 0 1 0 14"/></svg>';
function searchNorm(s){
  return (s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f\u0591-\u05C7]/g,'')  // strip accents + nikud
    .replace(/\s+/g,' ').trim();
}
function runSearch(){
  const input = document.getElementById('search-input');
  const box = document.getElementById('search-results');
  const clear = document.getElementById('search-clear');
  const raw = input.value.trim();
  clear.classList.toggle('hide', raw.length===0);
  const q = searchNorm(raw);
  if(!q){ box.innerHTML=''; box.classList.add('hide'); return; }
  box.classList.remove('hide');
  const hits=[];
  for(const c of CARDS){
    const hay=[c.fr, c.he, c.he_plain, c.tr];
    if(c.forms) c.forms.forEach(f=>{ hay.push(f.he, f.tr); });
    if(searchNorm(hay.join(' ')).includes(q)) hits.push(c);
    if(hits.length>=80) break;
  }
  if(!hits.length){ box.innerHTML='<div class="search-empty">Aucun résultat pour « '+raw+' ».</div>'; return; }
  let html = '<div class="sr-count">'+hits.length+(hits.length>=80?'+':'')+' résultat'+(hits.length>1?'s':'')+'</div>';
  html += hits.map((c,i)=>{
    const tr = c.tr ? '<span class="sr-tr">'+c.tr+'</span>' : '';
    const expandable = !!(c.forms || c.note);
    const chevron = expandable ? '<span class="sr-chev" aria-hidden="true">›</span>' : '';
    let detail = '';
    if(expandable){
      detail = '<div class="sr-detail hide" id="srd-'+i+'">';
      if(c.forms){
        const lbl = c.cat==='Verbes' ? 'Présent' : (c.cat==='Noms' ? 'Pluriel' : 'Autres formes');
        detail += '<div class="srd-title">'+lbl+'</div><div class="srd-forms">';
        c.forms.forEach(f=>{
          detail += '<div class="srd-f"><span class="srd-he">'+f.he+'</span>'
                 +  '<span class="srd-lbl">'+f.label+(f.tr?' · '+f.tr:'')+'</span></div>';
        });
        detail += '</div>';
      }
      if(c.note) detail += '<div class="srd-note">'+c.note+'</div>';
      detail += '</div>';
    }
    return '<div class="sr-item"'+(expandable?' data-exp="1"':'')+' id="sri-'+i+'">'
      + '<div class="sr-row" id="sr-'+i+'">'
      + '<button class="sr-speak" tabindex="-1" aria-label="Écouter">'+SPK_SVG+'</button>'
      + '<div class="sr-body"><span class="sr-he">'+c.he+'</span>'+tr+'<div class="sr-fr">'+c.fr+'</div></div>'
      + '<span class="sr-cat">'+c.cat+'</span>'+chevron
      + '</div>'+detail+'</div>';
  }).join('');
  box.innerHTML = html;
  hits.forEach((c,i)=>{
    const speakBtn=document.querySelector('#sr-'+i+' .sr-speak');
    if(speakBtn) bindTap(speakBtn, ()=>speak(c.he||c.he_plain));
    const row=document.getElementById('sr-'+i);
    const item=document.getElementById('sri-'+i);
    const detail=document.getElementById('srd-'+i);
    if(row){
      bindTap(row, ()=>{
        speak(c.he||c.he_plain);            // still pronounce on tap
        if(detail){                          // and toggle inflections if any
          const open=detail.classList.toggle('hide');
          item.classList.toggle('open', !open);
        }
      });
    }
  });
}
document.getElementById('search-input').addEventListener('input', runSearch);
document.getElementById('search-clear').addEventListener('click', ()=>{
  const input=document.getElementById('search-input');
  input.value=''; runSearch(); input.focus();
});

// ----- build category chips -----
const catCounts = {};
CARDS.forEach(c=>{ catCounts[c.cat]=(catCounts[c.cat]||0)+1; });
const catOrder = ['Pronoms personnels','Démonstratifs','Verbes','Adjectifs','Noms',
  'Prépositions','Conjonctions','Mots interrogatifs','Existence','Nombres',
  'Jours de la semaine','Mots de quantité','Expressions'];
const catsEl = document.getElementById('cats');
catOrder.filter(c=>catCounts[c]).forEach(cat=>{
  const b=document.createElement('button');
  b.className='chip'; b.setAttribute('aria-pressed','false'); b.dataset.cat=cat;
  b.innerHTML=cat+' <span class="n">'+catCounts[cat]+'</span>';
  b.onclick=()=>{ toggle(b); if(b.getAttribute('aria-pressed')==='true') state.cats.add(cat); else state.cats.delete(cat); updateStart(); };
  catsEl.appendChild(b);
});

function toggle(b){ b.setAttribute('aria-pressed', b.getAttribute('aria-pressed')==='true'?'false':'true'); }
function segPick(container, key){
  container.querySelectorAll('.chip').forEach(c=>c.setAttribute('aria-pressed','false'));
  event.currentTarget.setAttribute('aria-pressed','true');
  state[key]=event.currentTarget.dataset[key];
}
document.getElementById('dir').querySelectorAll('.chip').forEach(c=>c.onclick=e=>segPick(document.getElementById('dir'),'dir'));
document.getElementById('script').querySelectorAll('.chip').forEach(c=>c.onclick=e=>segPick(document.getElementById('script'),'script'));
document.getElementById('order').querySelectorAll('.chip').forEach(c=>c.onclick=e=>segPick(document.getElementById('order'),'order'));
document.getElementById('audio').querySelectorAll('.chip').forEach(c=>c.onclick=e=>segPick(document.getElementById('audio'),'audio'));
document.getElementById('mode').querySelectorAll('.chip').forEach(c=>c.onclick=e=>segPick(document.getElementById('mode'),'mode'));

document.getElementById('selall').onclick=()=>{
  const allOn = state.cats.size===Object.keys(catCounts).length;
  catsEl.querySelectorAll('.chip').forEach(b=>{
    b.setAttribute('aria-pressed', allOn?'false':'true');
  });
  state.cats.clear();
  if(!allOn) Object.keys(catCounts).forEach(c=>state.cats.add(c));
  updateStart();
};
function updateStart(){ document.getElementById('start').disabled = state.cats.size===0; }
updateStart();

// Voice availability note in setup
(function(){
  const note = document.getElementById('audio-note');
  if(!note) return;
  function refresh(){
    if(!TTS_OK){ note.textContent = "Synthèse vocale non disponible sur ce navigateur."; return; }
    note.textContent = heVoice
      ? "Voix hébraïque détectée ✓"
      : "Aucune voix hébraïque installée sur l'appareil — le son peut être approximatif. (iOS : Réglages → Accessibilité → Contenu énoncé → Voix → Hébreu.)";
  }
  refresh();
  if(TTS_OK) window.speechSynthesis.addEventListener('voiceschanged', refresh);
})();

// ----- start -----
document.getElementById('start').onclick=start;
function start(){
  let pool = CARDS.filter(c=>state.cats.has(c.cat));
  if(state.order==='shuffle') pool = shuffle(pool.slice());
  state.queue=pool; state.idx=0; state.missed=[]; state.goodCount=0; state.total=pool.length; state.flipped=false;
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('done').classList.remove('active');
  document.getElementById('study').classList.add('active');
  render();
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function heFront(card){
  if(state.script==='plain') return '<div class="big-he">'+card.he_plain+'</div>';
  if(state.script==='cursive') return '<div class="big-he cursive">'+card.he_plain+'</div>';
  return '<div class="big-he">'+card.he+'</div>';
}
function formsHtml(card){
  if(!card.forms) return '';
  let h='<div class="forms">';
  card.forms.forEach(f=>{ h+='<div><span class="f-he">'+f.he+'</span> <span class="f-lbl">'+f.label+' · '+f.tr+'</span></div>'; });
  return h+'</div>';
}

function render(){
  const card=state.queue[state.idx];
  state.flipped=false;
  state.answered=false;

  const note = card.note ? '<div class="note-line">'+card.note+'</div>' : '';

  if(state.dir==='he2fr'){
    state.frontHtml = heFront(card);
    let b = '<div class="big-fr">'+card.fr+'</div>';
    if(card.tr) b += '<div class="translit">'+card.tr+'</div>';
    if(state.script!=='nikud') b += '<div class="sub-he">'+card.he+'</div>';
    b += formsHtml(card) + note;
    state.backHtml = b;
  } else {
    state.frontHtml = '<div class="big-fr">'+card.fr+'</div>' + (card.tr?'<div class="translit">'+card.tr+'</div>':'');
    let b = '<div class="big-he">'+card.he+'</div>';
    b += '<div class="cursive-line">'+card.he_plain+'</div>';
    if(card.tr) b += '<div class="translit">'+card.tr+'</div>';
    b += formsHtml(card) + note;
    state.backHtml = b;
  }

  document.getElementById('face-cat').textContent = card.cat;
  document.getElementById('face-content').innerHTML = state.frontHtml;
  animateFace();

  document.getElementById('counter').textContent=(state.idx+1)+' / '+state.total;
  document.getElementById('barfill').style.width=((state.idx)/state.total*100)+'%';

  if(state.mode==='input') setupInputCard(card);
  else setupCardsMode();

  updateSpeaker();
  // Auto-play: speak the Hebrew as soon as it is visible (front side in he→fr mode).
  if(state.audio==='auto' && state.dir==='he2fr') speakCurrent();
}

function setupCardsMode(){
  document.getElementById('controls-cards').classList.remove('hide');
  document.getElementById('input-zone').classList.add('hide');
  document.getElementById('kbd-hint').classList.remove('hide');
  document.getElementById('face-hint').textContent = 'tap pour retourner';
  document.getElementById('btn-flip').classList.remove('hide');
  document.getElementById('btn-again').classList.add('hide');
  document.getElementById('btn-good').classList.add('hide');
}

function setupInputCard(card){
  document.getElementById('controls-cards').classList.add('hide');
  document.getElementById('input-zone').classList.remove('hide');
  document.getElementById('kbd-hint').classList.add('hide');
  document.getElementById('face-hint').textContent = state.dir==='he2fr' ? 'traduis en français' : 'écris en hébreu';
  const inp=document.getElementById('answer-input');
  inp.value=''; inp.className=''; inp.disabled=false;
  inp.placeholder = state.dir==='he2fr' ? 'Traduction en français…' : 'En hébreu ou en translittération…';
  document.getElementById('input-row').classList.remove('hide');
  document.getElementById('btn-check').classList.remove('hide');
  document.getElementById('feedback').innerHTML='';
  document.getElementById('btn-next').classList.add('hide');
  setTimeout(()=>{ try{ inp.focus(); }catch(e){} }, 60);
}

function animateFace(){
  const face=document.getElementById('face');
  face.classList.remove('flip-anim'); void face.offsetWidth; face.classList.add('flip-anim');
  face.scrollTop=0;
}

function doFlip(){
  state.flipped=!state.flipped;
  document.getElementById('face-content').innerHTML = state.flipped ? state.backHtml : state.frontHtml;
  document.getElementById('face-hint').textContent = state.flipped ? 'tap pour revenir' : 'tap pour retourner';
  animateFace();
  if(state.flipped){
    document.getElementById('btn-flip').classList.add('hide');
    document.getElementById('btn-again').classList.remove('hide');
    document.getElementById('btn-good').classList.remove('hide');
  } else {
    document.getElementById('btn-flip').classList.remove('hide');
    document.getElementById('btn-again').classList.add('hide');
    document.getElementById('btn-good').classList.add('hide');
  }
  updateSpeaker();
  // Auto-play when flipping reveals the Hebrew answer (fr→he mode).
  if(state.audio==='auto' && state.flipped && state.dir==='fr2he') speakCurrent();
}
function bindTap(el, fn){
  let handled=false;
  el.addEventListener('pointerup', (e)=>{ e.preventDefault(); e.stopPropagation(); handled=true; fn(); setTimeout(()=>handled=false,50); });
  el.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); if(!handled) fn(); });
}
bindTap(document.getElementById('flip'), ()=>{ if(state.mode==='cards') doFlip(); });
bindTap(document.getElementById('btn-flip'), doFlip);

function answer(good){
  const card=state.queue[state.idx];
  if(good) state.goodCount++; else state.missed.push(card);
  state.idx++;
  if(state.idx>=state.queue.length) finish();
  else render();
}
bindTap(document.getElementById('btn-good'), ()=>answer(true));
bindTap(document.getElementById('btn-again'), ()=>answer(false));
bindTap(document.getElementById('speak-btn'), speakCurrent);

// ---------- Input mode: answer checking ----------
function normFr(s){
  return (s||'')
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')   // strip accents
    .replace(/\([^)]*\)/g,' ')                          // drop parentheticals like (m), (infinitif)
    .replace(/[.!?;:«»"']/g,' ')
    .replace(/\s+/g,' ')
    .trim()
    .replace(/^(le|la|les|l|un|une|des|du|de|d|a|au|aux|se|s|to)\s+/,''); // drop a leading article
}
function frVariants(fr){
  // "garçon / enfant", "beau / joli", "entendre / écouter" -> multiple accepted answers
  return fr.split(/[\/,]| ou /).map(normFr).filter(Boolean);
}
function normHe(s){ return (s||'').replace(/[\u0591-\u05C7]/g,'').replace(/\s+/g,' ').trim(); }
function normTr(s){ return (s||'').toLowerCase().replace(/[^a-z]/g,''); }
function editDist(a,b){
  const m=a.length,n=b.length; if(!m)return n; if(!n)return m;
  const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++){
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  }
  return d[m][n];
}
function checkAnswer(card, raw){
  const user = (raw||'').trim();
  if(!user) return false;
  if(state.dir==='he2fr'){
    const u = normFr(user);
    const variants = frVariants(card.fr);
    for(const v of variants){
      if(!v) continue;
      if(u===v) return true;
      // tolerate 1 typo on words longer than 4 chars
      if(v.length>4 && editDist(u,v)<=1) return true;
    }
    return false;
  } else {
    // fr -> he: accept Hebrew (with/without nikud) OR the transliteration
    const uHe = normHe(user);
    if(uHe && uHe===normHe(card.he)) return true;
    if(card.tr){
      const uTr = normTr(user);
      if(uTr && uTr===normTr(card.tr)) return true;
    }
    return false;
  }
}
function answerHtml(card){
  let h = '<div class="answer">';
  if(state.dir==='he2fr'){
    h += '<span class="he">'+card.he+'</span>';
    h += '<div>'+card.fr+'</div>';
    if(card.tr) h += '<div class="tr">'+card.tr+'</div>';
  } else {
    h += '<div>'+card.fr+'</div>';
    h += '<span class="he">'+card.he+'</span>';
    if(card.tr) h += '<div class="tr">'+card.tr+'</div>';
  }
  return h+'</div>';
}
function submitAnswer(){
  if(state.answered) return;
  const card=state.queue[state.idx];
  const inp=document.getElementById('answer-input');
  const correct=checkAnswer(card, inp.value);
  state.answered=true;
  inp.disabled=true;
  inp.classList.add(correct?'ok':'no');
  document.getElementById('input-row').classList.add('hide');
  const fb=document.getElementById('feedback');
  fb.innerHTML = (correct
      ? '<div class="verdict ok">✓ Correct</div>'
      : '<div class="verdict no">✗ Réponse&nbsp;:</div>') + answerHtml(card);
  document.getElementById('btn-next').classList.remove('hide');
  if(correct) state.goodCount++; else state.missed.push(card);
  updateSpeaker();
  // speak the Hebrew after answering
  if(TTS_OK && (state.audio==='auto' || state.dir==='fr2he')) speakCurrent();
}
function nextAfterInput(){
  state.idx++;
  if(state.idx>=state.queue.length) finish();
  else render();
}
bindTap(document.getElementById('btn-check'), submitAnswer);
bindTap(document.getElementById('btn-next'), nextAfterInput);
document.getElementById('answer-input').addEventListener('keydown', e=>{
  if(e.key==='Enter'){ e.preventDefault(); submitAnswer(); }
});

function finish(){
  document.getElementById('study').classList.remove('active');
  document.getElementById('done').classList.add('active');
  document.getElementById('barfill').style.width='100%';
  const el=document.getElementById('score');
  el.innerHTML=state.goodCount+'<small>/'+state.total+'</small>';
  const pct=Math.round(state.goodCount/state.total*100);
  let msg;
  if(pct===100) msg='Sans faute. כָּל הַכָּבוֹד !';
  else if(pct>=70) msg=state.missed.length+' carte'+(state.missed.length>1?'s':'')+' à revoir.';
  else msg='Encore un peu d\'entraînement — '+state.missed.length+' à revoir.';
  document.getElementById('done-msg').textContent=msg;
  document.getElementById('retry-missed').style.display = state.missed.length? 'inline-block':'none';
}

document.getElementById('retry-missed').onclick=()=>{
  state.queue = state.order==='shuffle'? shuffle(state.missed.slice()):state.missed.slice();
  state.idx=0; state.total=state.queue.length; state.missed=[]; state.goodCount=0;
  document.getElementById('done').classList.remove('active');
  document.getElementById('study').classList.add('active');
  render();
};
document.getElementById('retry-all').onclick=start;
document.getElementById('back-setup').onclick=()=>{
  document.getElementById('done').classList.remove('active');
  document.getElementById('study').classList.remove('active');
  document.getElementById('setup').classList.remove('hidden');
};
document.getElementById('exit').onclick=()=>{
  document.getElementById('study').classList.remove('active');
  document.getElementById('setup').classList.remove('hidden');
};

// keyboard
document.addEventListener('keydown', e=>{
  if(!document.getElementById('study').classList.contains('active')) return;
  if(state.mode==='input') return;   // input mode has its own Enter handling
  if(e.code==='Space'){ e.preventDefault(); doFlip(); }
  else if(state.flipped && e.code==='ArrowRight'){ answer(true); }
  else if(state.flipped && e.code==='ArrowLeft'){ answer(false); }
});
</script>
